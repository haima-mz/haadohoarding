                                <div class="form-row">

                                        <label class="small font-weight-bold">Company name</label>
                                        <input type="text" class="form-control" value="Ravi Outdoor Media">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="col-md-6 mb-3">
                                        <label class="small font-weight-bold">Email</label>
                                        <input type="email" class="form-control" value="vendor@example.com">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="small font-weight-bold">Phone</label>
                                        <input type="tel" class="form-control" value="9876543210">
                                    </div>
                                </div>
                                <div class="form-group mb-3">
                                    <label class="small font-weight-bold">Business address</label>
                                    <input type="text" class="form-control" value="Kochi, Kerala">
                                </div>
                                <button type="submit" class="btn btn-primary">Save changes</button>

                        </div>
