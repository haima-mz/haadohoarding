<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Vendor login — BigFlex</title>
    <link href="vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700,800" rel="stylesheet">
    <link href="css/sb-admin-2.min.css" rel="stylesheet">
    <link href="css/brand-override.css" rel="stylesheet">
</head>
<body class="bg-gradient-primary">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-xl-10 col-lg-12 col-md-9">
                <div class="card o-hidden border-0 shadow-lg my-5">
                    <div class="card-body p-0">
                        <div class="row">
                            <div class="col-lg-6 d-none d-lg-block bg-login-image"></div>
                            <div class="col-lg-6">
                                <div class="p-5">
                                    <div class="text-center">
                                        <div class="sidebar-brand-text" style="color:#16181D; font-size:22px;">BIG<span class="hl">FLEX</span></div>
                                        <h1 class="h4 text-gray-900 mb-4 mt-2">Vendor login</h1>
                                    </div>
                                    <form class="user" id="vendorLoginForm" novalidate>
                                        <div class="form-group">
                                            <input type="email" class="form-control form-control-user" id="email"
                                                placeholder="Email address">
                                            <div class="small text-danger mt-1 d-none" id="emailError">Enter a valid email address.</div>
                                        </div>
                                        <div class="form-group">
                                            <input type="password" class="form-control form-control-user" id="password"
                                                placeholder="Password">
                                            <div class="small text-danger mt-1 d-none" id="passwordError">Password is required.</div>
                                        </div>
                                        <div class="form-group">
                                            <div class="custom-control custom-checkbox small">
                                                <input type="checkbox" class="custom-control-input" id="rememberMe">
                                                <label class="custom-control-label" for="rememberMe">Remember me</label>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Log in
                                        </button>
                                    </form>
                                    <hr>
                                    <div class="text-center">
                                        <a class="small" href="#">Forgot password?</a>
                                    </div>
                                    <div class="text-center">
                                        <a class="small" href="register.html">List your hoarding — create a vendor account</a>
                                    </div>
                                    <div class="text-center mt-3">
                                        <a class="small text-muted" href="../index.html">&larr; Back to BigFlex</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/jquery/jquery.min.js"></script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="js/sb-admin-2.min.js"></script>
    <script>
        document.getElementById('vendorLoginForm').addEventListener('submit', function(e){
            e.preventDefault();
            let valid = true;
            const email = document.getElementById('email').value.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
                document.getElementById('emailError').classList.remove('d-none'); valid = false;
            } else {
                document.getElementById('emailError').classList.add('d-none');
            }
            const password = document.getElementById('password').value;
            if (password.length < 1){
                document.getElementById('passwordError').classList.remove('d-none'); valid = false;
            } else {
                document.getElementById('passwordError').classList.add('d-none');
            }
            if (valid){ window.location.href = 'dashboard.html'; }
        });
    </script>

</body>
</html>
